<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">telegram-web-relay architecture</title>
  <desc id="desc">Browser client connects to telegram-web-relay over HTTP and Socket.IO. The relay connects to Telegram through TDLib and MTProto.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="relay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="920" height="360" rx="24" fill="url(#bg)"/>
  <text x="52" y="62" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700">Self-hosted Telegram Web relay</text>
  <text x="52" y="94" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Keep the Telegram session on your own server. Use the browser through HTTP and Socket.IO.</text>

  <g filter="url(#shadow)">
    <rect x="52" y="138" width="210" height="118" rx="18" fill="#f8fafc"/>
    <text x="157" y="179" text-anchor="middle" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="700">Browser UI</text>
    <text x="157" y="207" text-anchor="middle" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">telegram-web-relay-client</text>
    <text x="157" y="229" text-anchor="middle" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Static web app</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="356" y="122" width="230" height="150" rx="22" fill="url(#relay)"/>
    <text x="471" y="171" text-anchor="middle" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">telegram-web-relay</text>
    <text x="471" y="201" text-anchor="middle" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Node.js + Express + Socket.IO</text>
    <text x="471" y="225" text-anchor="middle" fill="#ccfbf1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">TDLib session owner</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="682" y="138" width="186" height="118" rx="18" fill="#f8fafc"/>
    <text x="775" y="180" text-anchor="middle" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Telegram</text>
    <text x="775" y="210" text-anchor="middle" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">TDLib / MTProto</text>
    <text x="775" y="231" text-anchor="middle" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Official account session</text>
  </g>

  <path d="M272 197 H344" stroke="#67e8f9" stroke-width="5" stroke-linecap="round"/>
  <path d="M333 185 L349 197 L333 209" fill="none" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="309" y="173" text-anchor="middle" fill="#bae6fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">HTTP + Socket.IO</text>

  <path d="M596 197 H670" stroke="#99f6e4" stroke-width="5" stroke-linecap="round"/>
  <path d="M659 185 L675 197 L659 209" fill="none" stroke="#99f6e4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="633" y="173" text-anchor="middle" fill="#ccfbf1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">TDLib / MTProto</text>

  <rect x="52" y="292" width="816" height="32" rx="16" fill="#020617" opacity="0.42"/>
  <text x="460" y="313" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">The browser talks to your relay. The relay owns the authenticated Telegram session.</text>
</svg>
