name: Issue responder

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write

jobs:
  respond:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Post triage response
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- telegram-web-relay-client issue responder v1 -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.info('Issue responder comment already exists. Skipping.');
              return;
            }

            const body = [
              marker,
              'Thanks for opening this issue.',
              '',
              'This repository uses an automated issue responder so new reports do not sit unattended.',
              '',
              'Please make sure the issue includes:',
              '- What you expected to happen',
              '- What actually happened',
              '- Reproduction steps or screenshots, if this is a UI bug',
              '- Your browser, Node.js, and relay server version, if relevant',
              '',
              'Maintainers can add `ai-candidate` when the issue is a good fit for an automated coding agent.',
              '',
              '---',
              '',
              '이슈를 열어줘서 고마워요.',
              '',
              '이 저장소는 새 이슈가 방치되지 않도록 자동 응답 봇을 사용합니다.',
              '',
              '가능하면 아래 정보를 같이 적어주세요:',
              '- 기대한 동작',
              '- 실제 동작',
              '- UI 버그라면 재현 절차나 스크린샷',
              '- 관련 있다면 브라우저, Node.js, relay server 버전',
              '',
              '관리자는 자동 코딩 에이전트가 처리하기 좋은 이슈에 `ai-candidate` 라벨을 붙일 수 있습니다.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['needs-triage'],
              });
            } catch (error) {
              core.warning(`Could not add needs-triage label: ${error.message}`);
            }
